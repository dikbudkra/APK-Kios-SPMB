name: Rakit APK Kios

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Siapkan Sistem Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Gunakan Mesin Gradle Lawas (Spesifik)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.4.2'

      - name: Proses Membangun APK Langsung
        run: gradle assembleDebug

      - name: Simpan dan Siapkan Unduhan
        uses: actions/upload-artifact@v4
        with:
          name: APK-Kios-SPMB-2026
          path: app/build/outputs/apk/debug/*.apk
